services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pi_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      CORS_ORIGIN: "http://localhost:8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/pi_demo"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: "http://localhost:3000"
    ports:
      - "8080:8080"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
